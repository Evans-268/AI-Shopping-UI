<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Akun - ShopAssist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #9cf860;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .settings-container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }
        .settings-container h2 {
            color: #63c9ff;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-save {
            background-color: #63c9ff;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 10px;
        }
        .btn-save:hover {
            background-color: #4bb5f0;
        }
        .btn-back {
            background-color: transparent;
            color: #333;
            border: 1px solid #ccc;
            padding: 10px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }
        .btn-back:hover {
            background-color: #f0f0f0;
        }
        .success-msg {
            color: #2e7d32;
            background-color: #e8f5e9;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #2e7d32;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <h2><i class="fas fa-cog"></i> Pengaturan Akun</h2>
        
        {% if message %}
            <div class="success-msg"><i class="fas fa-check-circle"></i> {{ message }}</div>
        {% endif %}
        
        <form method="POST" action="/settings">
            <div class="input-group">
                <label for="new_email">Email Baru</label>
                <input type="email" id="new_email" name="new_email" value="{{ current_email }}" required>
            </div>
            <div class="input-group">
                <label for="new_password">Password Baru</label>
                <input type="password" id="new_password" name="new_password" placeholder="Masukkan password baru..." required>
            </div>
            <button type="submit" class="btn-save">Simpan Perubahan</button>
        </form>
        
        <a href="/chat" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Chat</a>
    </div>
</body>
</html>
